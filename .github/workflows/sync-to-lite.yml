name: Sync Pro to Lite

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GALLOP_APP_ID }}
          private-key: ${{ secrets.GALLOP_APP_PRIVATE_KEY }}
          owner: gallop-software
          repositories: speedwell

      - name: Checkout Pro repo
        uses: actions/checkout@v4
        with:
          path: pro

      - name: Clone Lite repo
        run: |
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/gallop-software/speedwell.git lite

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync files from Pro to Lite
        run: |
          # Copy all files except .git
          rsync -av --exclude='.git' --exclude='node_modules' pro/ lite/

      - name: Install dependencies and run blocks:lite
        working-directory: lite
        run: |
          npm ci
          npm run blocks:lite

      - name: Commit and push to Lite
        working-directory: lite
        run: |
          git config user.name "gallop-blocks-api[bot]"
          git config user.email "gallop-blocks-api[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync from pro branch"
            git push origin main
          fi
