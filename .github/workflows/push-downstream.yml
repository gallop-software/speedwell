# Push to downstream repos on version bump
# Only runs when package.json version changes
name: Push Downstream

on:
  push:
    branches:
      - main

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GALLOP_APP_ID }}
          private-key: ${{ secrets.GALLOP_APP_PRIVATE_KEY }}
          owner: gallop-software
          repositories: speedwell,speedwell-pro

      - name: Checkout dev repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: dev

      - name: Check for version bump
        id: version-check
        working-directory: dev
        run: |
          CURRENT_VERSION=$(jq -r .version package.json)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

          if [ "v$CURRENT_VERSION" == "$LAST_TAG" ]; then
            echo "No version bump detected (current: v$CURRENT_VERSION, last tag: $LAST_TAG)"
            echo "should_sync=false" >> $GITHUB_OUTPUT
          else
            echo "Version bump detected: $LAST_TAG -> v$CURRENT_VERSION"
            echo "should_sync=true" >> $GITHUB_OUTPUT
          fi

      - name: Get commit messages since last tag
        if: steps.version-check.outputs.should_sync == 'true'
        id: commits
        working-directory: dev
        run: |
          LAST_TAG="${{ steps.version-check.outputs.last_tag }}"
          if [ -z "$LAST_TAG" ]; then
            # No previous tag, get all commits
            COMMITS=$(git log --oneline --no-decorate | head -20)
          else
            COMMITS=$(git log --oneline --no-decorate $LAST_TAG..HEAD)
          fi

          # Store commits for release notes
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Tag dev repo
        if: steps.version-check.outputs.should_sync == 'true'
        working-directory: dev
        run: |
          VERSION="v${{ steps.version-check.outputs.current_version }}"
          git config user.name "gallop-sync-bot[bot]"
          git config user.email "gallop-sync-bot[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Clone downstream repos
        if: steps.version-check.outputs.should_sync == 'true'
        run: |
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/gallop-software/speedwell-pro.git pro
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/gallop-software/speedwell.git lite

      - name: Setup Node.js
        if: steps.version-check.outputs.should_sync == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync to speedwell-pro (full blocks)
        if: steps.version-check.outputs.should_sync == 'true'
        run: |
          # Copy all files except .git, node_modules, and all workflows
          rsync -av --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.github/workflows/' \
            dev/ pro/

          # Run speedwell-pro preparation script (no npm needed - uses only built-in Node modules)
          cd pro
          node _scripts/prepare-speedwell-pro.mjs

      - name: Sync to speedwell (lite blocks)
        if: steps.version-check.outputs.should_sync == 'true'
        run: |
          # Copy all files except .git, node_modules, and all workflows
          rsync -av --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.github/workflows/' \
            dev/ lite/

          # Run speedwell-lite and speedwell-pro scripts (no npm needed - uses only built-in Node modules)
          cd lite
          node _scripts/prepare-speedwell-lite.mjs
          node _scripts/prepare-speedwell-pro.mjs

      - name: Commit and push to speedwell-pro
        if: steps.version-check.outputs.should_sync == 'true'
        working-directory: pro
        run: |
          VERSION="v${{ steps.version-check.outputs.current_version }}"
          git config user.name "gallop-sync-bot[bot]"
          git config user.email "gallop-sync-bot[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit to speedwell-pro"
          else
            cat <<EOF | git commit -F -
          Release $VERSION

          ${{ steps.commits.outputs.commits }}
          EOF
            git push origin main
          fi

          # Create tag
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Commit and push to speedwell (lite)
        if: steps.version-check.outputs.should_sync == 'true'
        working-directory: lite
        run: |
          VERSION="v${{ steps.version-check.outputs.current_version }}"
          git config user.name "gallop-sync-bot[bot]"
          git config user.email "gallop-sync-bot[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit to speedwell"
          else
            cat <<EOF | git commit -F -
          Release $VERSION

          ${{ steps.commits.outputs.commits }}
          EOF
            git push origin main
          fi

          # Create tag
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create release on speedwell-pro
        if: steps.version-check.outputs.should_sync == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="v${{ steps.version-check.outputs.current_version }}"

          # Create zip
          cd pro
          REPO_NAME="speedwell-pro"
          cd ..
          cp -r pro $REPO_NAME-temp
          rm -rf $REPO_NAME-temp/.git
          mkdir -p $REPO_NAME-folder/$REPO_NAME
          mv $REPO_NAME-temp/* $REPO_NAME-folder/$REPO_NAME/ 2>/dev/null || true
          mv $REPO_NAME-temp/.* $REPO_NAME-folder/$REPO_NAME/ 2>/dev/null || true
          cd $REPO_NAME-folder
          zip -r ../$REPO_NAME.zip $REPO_NAME
          cd ..

          # Create release
          gh release create "$VERSION" \
            --repo gallop-software/speedwell-pro \
            --title "Release $VERSION" \
            --notes "${{ steps.commits.outputs.commits }}" \
            $REPO_NAME.zip

      - name: Create release on speedwell (lite)
        if: steps.version-check.outputs.should_sync == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="v${{ steps.version-check.outputs.current_version }}"

          # Create zip
          cd lite
          REPO_NAME="speedwell"
          cd ..
          cp -r lite $REPO_NAME-temp
          rm -rf $REPO_NAME-temp/.git
          mkdir -p $REPO_NAME-folder/$REPO_NAME
          mv $REPO_NAME-temp/* $REPO_NAME-folder/$REPO_NAME/ 2>/dev/null || true
          mv $REPO_NAME-temp/.* $REPO_NAME-folder/$REPO_NAME/ 2>/dev/null || true
          cd $REPO_NAME-folder
          zip -r ../$REPO_NAME.zip $REPO_NAME
          cd ..

          # Create release
          gh release create "$VERSION" \
            --repo gallop-software/speedwell \
            --title "Release $VERSION" \
            --notes "${{ steps.commits.outputs.commits }}" \
            $REPO_NAME.zip
